<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0C14"/>
      <stop offset="1" stop-color="#10162A"/>
    </linearGradient>
    <linearGradient id="human" x1="60" y1="140" x2="200" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD9B0"/>
      <stop offset="1" stop-color="#FFB57C"/>
    </linearGradient>
    <linearGradient id="robot" x1="312" y1="140" x2="452" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#80FFEA"/>
      <stop offset="1" stop-color="#7C5CFF"/>
    </linearGradient>
    <linearGradient id="arrow" x1="190" y1="240" x2="330" y2="272" gradientUnits="userSpaceOnUse">
      <stop stop-color="#80FFEA"/>
      <stop offset="1" stop-color="#7C5CFF"/>
    </linearGradient>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="150" fill="url(#bg)" stroke="rgba(124,92,255,0.4)" stroke-width="2"/>

  <!-- Human head -->
  <circle cx="152" cy="210" r="56" fill="url(#human)"/>
  <rect x="108" y="262" width="88" height="62" rx="28" fill="url(#human)"/>

  <!-- Robot head -->
  <rect x="304" y="150" width="96" height="112" rx="18" fill="url(#robot)"/>
  <rect x="324" y="176" width="56" height="28" rx="10" fill="#0B0F1A" fill-opacity="0.5"/>
  <circle cx="334" cy="190" r="6" fill="#80FFEA"/>
  <circle cx="356" cy="190" r="6" fill="#80FFEA"/>
  <circle cx="378" cy="190" r="6" fill="#80FFEA"/>
  <rect x="316" y="268" width="72" height="52" rx="16" fill="url(#robot)"/>

  <!-- Double arrow -->
  <path d="M196 256h120" stroke="url(#arrow)" stroke-width="14" stroke-linecap="round"/>
  <path d="M300 236l20 20-20 20" stroke="url(#arrow)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M212 236l-20 20 20 20" stroke="url(#arrow)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
