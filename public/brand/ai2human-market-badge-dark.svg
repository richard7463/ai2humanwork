<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0C14"/>
      <stop offset="1" stop-color="#10162A"/>
    </linearGradient>
    <linearGradient id="ringA" x1="120" y1="80" x2="420" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#80FFEA"/>
      <stop offset="1" stop-color="#7C5CFF"/>
    </linearGradient>
    <linearGradient id="ringB" x1="380" y1="80" x2="120" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFC46B"/>
      <stop offset="1" stop-color="#7C5CFF"/>
    </linearGradient>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="150" fill="url(#bg)" stroke="rgba(124,92,255,0.4)" stroke-width="2"/>
  <circle cx="256" cy="256" r="176" stroke="url(#ringA)" stroke-width="16"/>
  <circle cx="256" cy="256" r="134" stroke="url(#ringB)" stroke-width="10"/>

  <text x="256" y="122" font-size="22" fill="#80FFEA" font-family="Space Grotesk, Sora, Inter, sans-serif" text-anchor="middle" letter-spacing="3">HUMAN</text>
  <text x="256" y="406" font-size="22" fill="#7C5CFF" font-family="Space Grotesk, Sora, Inter, sans-serif" text-anchor="middle" letter-spacing="3">AI</text>

  <rect x="164" y="180" width="184" height="152" rx="20" fill="rgba(10,12,20,0.95)" stroke="rgba(255,255,255,0.12)"/>
