  <text x="256" y="276" font-size="14" fill="rgba(244,246,255,0.7)" font-family="Space Grotesk, Sora, Inter, sans-serif" text-anchor="middle">Two-way labor</text>
  <text x="256" y="302" font-size="14" fill="rgba(244,246,255,0.7)" font-family="Space Grotesk, Sora, Inter, sans-serif" text-anchor="middle">AI ↔ Human</text>
